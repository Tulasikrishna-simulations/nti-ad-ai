<style>

/* Header */
.header{background:#120010;border-bottom:1px solid #2a0028;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#f3e8ff;letter-spacing:.04em}
.header-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4a2860;letter-spacing:.25em;margin-bottom:3px}
.header-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:#9e7ab5;margin-top:3px}
.header-count{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:#ff2d78;line-height:1;text-align:right}
.header-count-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:#4a2860;letter-spacing:.2em;margin-bottom:3px;text-align:right}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #2a0028;overflow-x:auto;background:#0a0008}
.tab-btn{flex:1;min-width:80px;padding:11px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:#9e7ab5;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;white-space:nowrap;transition:all .2s}
.tab-btn.active{background:#120010;border-bottom-color:#ff2d78;color:#ff2d78}
.tab-btn:hover:not(.active){color:#f3e8ff}

/* Content */
.content{padding:16px;max-width:1100px;margin:0 auto}

/* Panels */
.panel{background:#120010;border:1px solid #2a0028;border-radius:12px;padding:16px}
.panel-glow-red{box-shadow:0 0 30px rgba(255,23,68,.06)}

/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex-col{display:flex;flex-direction:column;gap:12px}

.score-fill{height:100%;border-radius:3px;transition:width .8s ease}

.bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
.bar-track{height:4px;background:#2a0028;border-radius:3px;overflow:hidden}

function quickScore(text) {
  const t = text.toLowerCase();
  const urgency = ["now","hurry","limited","expires","last chance","today only","act now","book now"].filter(w=>t.includes(w)).length;
  const health = ["healthy","nutritious","immunity","strong","smart","grow taller","protein","vitamin","nourish","champion","boost"].filter(w=>t.includes(w)).length;
  const hype = ["amazing","incredible","best","revolutionary","proven","guaranteed","world","greatest","life-changing","unlock"].filter(w=>t.includes(w)).length;
  const specific = (text.match(/\d+\s*(g|mg|%|ml|kcal|cal|kg)/gi)||[]).length;
  const fairness = ["fair","glow","lighter","brighter skin","whitening","tone","complexion"].filter(w=>t.includes(w)).length;
  const celeb = ["sachin","dhoni","srk","shah rukh","virat","deepika","priyanka","amitabh","akshay","star","actor","ambassador"].filter(w=>t.includes(w)).length;
  const fear = ["don't miss","hold you back","left behind","missing out","before it's too late","don't let"].filter(w=>t.includes(w)).length;
  const manip = Math.min(1, urgency*0.14+hype*0.08+(health>0&&specific===0?0.28:0)+fairness*0.18+fear*0.14);
  const verif = Math.min(1, specific*0.18+(urgency===0?0.15:0)+(hype===0?0.15:0));
  const ts = Math.max(5,Math.round((1-manip)*(0.4+verif*0.6)*100));
  return {ts,manipulation:Math.round(manip*100),verifiability:Math.round(verif*100),urgency,health,hype,specific,fairness,celeb,fear};
}

AD: "${text.substring(0,500)}"

JSON only:
{"verdict":"HONEST"|"QUESTIONABLE"|"MISLEADING"|"HARMFUL","summary":"2 sentences on what this ad actually does","main_trick":"biggest manipulation in plain words","what_to_ask":"one question a smart consumer should ask","indian_context":"specific Indian regulatory issue or null","targets_children":true,"celebrity_disclaimer":"what consumers should know or null","kid_moral":"simple moral for a child or null"}`}]})

    {label:"🚫 Pan Masala",text:"Royal taste, elite lifestyle. Our cardamom blend — chosen by stars, enjoyed by those who know quality. When only the best will do. A statement, not just a product."},
    {label:"🍜 Maggi",text:"Mummy bhook lagi! Maggi — the great family nourisher. Ready in 2 minutes, packed with the nutrition your family needs. Iron, protein, and love in every bowl."},
    {label:"💄 Fairness",text:"Unlock your true potential. Lighter, brighter skin in just 4 weeks — proven by dermatologists. Your success story starts with the right glow. Don't let anything hold you back."},
    {label:"✅ Honest",text:"Our dal makhani uses 150g black dal per serving, slow-cooked 8 hours. Contains 340 kcal, 12g protein. Sourced from Punjab farms. Spice level varies slightly by batch."},
  ];

  const s = state.scores;
  const ai = state.aiResult;
  const tsColor = s ? (s.ts>=65?"#00e676":s.ts>=35?"#ffd740":"#ff1744") : "#4a2860";
  const vColors = {HONEST:"#00e676",QUESTIONABLE:"#ffd740",MISLEADING:"#ff6d00",HARMFUL:"#ff1744"};

  return `<div class="grid2">
  <!-- LEFT -->
  <div class="flex-col">
    <div class="panel">
      <div class="sec-label mono">PASTE ANY INDIAN AD TEXT</div>
      <textarea id="ad-textarea" placeholder="Paste an ad from TV, Instagram, a packet, or a billboard.&#10;&#10;Examples:&#10;• 'Boost is the secret of my energy!'&#10;• Any Bournvita or Horlicks ad&#10;• Any fairness cream ad&#10;• Any fast food promotion">${state.adText}</textarea>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
        ${SAMPLES.map((s,i)=>`<button class="btn-sample" onclick="loadSample(${i})"><span>${s.label}</span></button>`).join('')}
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap">
        <button class="btn-toggle" id="kid-toggle" onclick="toggleKid()" style="${state.kidMode?'background:rgba(224,64,251,.2);border-color:#e040fb;color:#e040fb':''}">
          👶 Kids mode ${state.kidMode?"ON":"OFF"}
        </button>
        <button class="btn-toggle" onclick="toggleKey()">🔑 API key ${state.apiKey?"✓ set":"(optional)"}</button>
      </div>
      ${state.showKey?`<div>
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." value="${state.apiKey}" oninput="state.apiKey=this.value">
        <div class="mono" style="font-size:9px;color:#4a2860;margin-top:4px">From console.anthropic.com — used only in this session, never stored</div>
      </div>`:''}
      <button class="btn-analyze" onclick="runAnalysis()" ${state.loading?'disabled':''}>
        ${state.loading?'⏳ ANALYZING...':'→ ANALYZE THIS AD'}
      </button>
    </div>
    <div class="panel mono" style="font-size:12px;color:#9e7ab5;line-height:1.9">
      <div class="sec-label">INDIA REGULATORY ECOSYSTEM</div>
      <div>⚖️ <span style="color:#00e5ff">ASCI</span> — Public ad complaint database. Upheld = confirmed.</div>
      <div>🔬 <span style="color:#00e5ff">FSSAI</span> — Government lab tests food. Maggi lead. Bournvita sugar.</div>
      <div>👶 <span style="color:#00e5ff">NCPCR</span> — Formal notices when children are targeted. Bournvita 2023.</div>
      <div>🏛 <span style="color:#00e5ff">Courts</span> — HC/SC judgments carry highest evidential weight.</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="flex-col">
    ${!s&&!state.loading?`<div class="panel" style="text-align:center;padding:52px">
      <div style="font-size:44px;margin-bottom:14px;opacity:.2">🔍</div>
      <div class="mono" style="font-size:12px;color:#4a2860;line-height:1.7">Results appear here.<br>Rule-based scoring is instant.<br>AI analysis needs an Anthropic API key.</div>
    </div>`:''}

    ${s?`<div class="panel fade" style="border-color:${tsColor}40;box-shadow:0 0 30px ${tsColor}06">
      <div class="sec-label mono">PAVE-C TRANSPARENCY SCORE</div>
      <div class="score-big" style="color:${tsColor}">${s.ts}</div>
      <div class="mono" style="font-size:11px;color:#9e7ab5;text-align:center;margin-bottom:12px">/ 100 · ${s.ts>=65?"low manipulation":s.ts>=35?"moderate manipulation":"high manipulation"}</div>
      <div class="score-track"><div class="score-fill" style="width:${s.ts}%;background:${tsColor}"></div></div>
      ${bar(s.manipulation,"#ff1744","Manipulation pressure",s.manipulation+"%")}
      ${bar(s.verifiability,"#00e676","Verifiable claims",s.verifiability+"%")}
      <div style="margin-top:8px">
        ${s.urgency>0?badge("urgency ×"+s.urgency,"#ff1744"):''}
        ${s.hype>0?badge("unverified hype ×"+s.hype,"#ff6d00"):''}
        ${s.health>0&&s.specific===0?badge("health claim — no data","#ffd740"):''}
        ${s.specific>0?badge(s.specific+" verifiable fact"+(s.specific!==1?"s":""),"#00e676"):''}
        ${s.fairness>0?badge("colorism / fairness signal","#ff2d78"):''}
        ${s.celeb>0?badge("celebrity signal","#e040fb"):''}
        ${s.fear>0?badge("fear / urgency language","#ff1744"):''}
      </div>
    </div>`:''}

    ${state.loading?`<div class="panel fade" style="text-align:center;padding:28px">
      <div class="mono" style="font-size:12px;color:#9e7ab5">⏳ Checking against ASCI, FSSAI, NCPCR records...</div>
    </div>`:''}

    ${ai?`<div class="panel fade" style="border-color:${(vColors[ai.verdict]||'#9e7ab5')+'40'}">
      <div style="margin-bottom:12px">
        ${badge(ai.verdict,vColors[ai.verdict]||'#9e7ab5')}
        ${ai.targets_children?badge("TARGETS CHILDREN ⚠","#e040fb"):''}
        ${ai.celebrity_disclaimer?badge("CELEBRITY","#00e5ff"):''}
      </div>
      <div style="font-size:13px;color:#f3e8ff;line-height:1.75;margin-bottom:12px">${ai.summary}</div>
      ${infoBox("#ff6d00","THE MAIN TRICK",ai.main_trick)}
      ${ai.indian_context?infoBox("#00e5ff","INDIA REGULATORY CONTEXT",ai.indian_context):''}
      ${ai.celebrity_disclaimer?infoBox("#00e5ff","THE CELEBRITY REALITY",ai.celebrity_disclaimer):''}
      ${infoBox("#ffd740","SMART QUESTION TO ASK","❓ "+ai.what_to_ask)}
      ${state.kidMode&&ai.kid_moral?`<div style="padding:12px;background:rgba(224,64,251,.1);border-radius:8px;border:1px solid rgba(224,64,251,.25)">
        <div class="mono" style="font-size:9px;color:#e040fb;letter-spacing:.15em;margin-bottom:5px">👶 SIMPLE MORAL</div>
        <div style="font-size:13px;color:#f3e8ff;font-style:italic;line-height:1.65">${ai.kid_moral}</div>
      </div>`:''}
    </div>`:''}

    ${state.error?`<div class="panel fade"><div class="mono" style="color:#ff1744;font-size:12px;padding:4px">${state.error}</div></div>`:''}
  </div>
</div>`;
}

function renderRealCases() {
  const sel = CASES[state.selectedCase];
  const sidebar = CASES.map((c,i)=>`
    <button class="case-btn${state.selectedCase===i?' active':''}" onclick="selectCase(${i})" style="${state.selectedCase===i?`background:${c.color}15;border-color:${c.color}50`:''};width:100%">
      <div style="font-size:20px;margin-bottom:4px">${c.emoji}</div>
      <div class="mono" style="font-size:10px;color:${state.selectedCase===i?c.color:'#f3e8ff'};font-weight:700;line-height:1.3;margin-bottom:3px">${c.brand}</div>
      <div class="mono" style="font-size:9px;color:#4a2860">UTI: ${c.score.uti}</div>
    </button>`).join('');

  return `<div class="cases-layout">
  <div class="case-sidebar">${sidebar}</div>
  <div class="flex-col fade">
    <div class="panel" style="border-color:${sel.color}30;box-shadow:0 0 30px ${sel.color}06">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;flex-wrap:wrap">
        <div style="font-size:42px">${sel.emoji}</div>
        <div style="flex:1;min-width:200px">
          <div class="syne" style="font-size:17px;font-weight:800;color:${sel.color};margin-bottom:3px">${sel.brand}</div>
          ${sel.actor!=="Brand advertising"?`<div class="mono" style="font-size:10px;color:#9e7ab5;margin-bottom:8px">${sel.actor}</div>`:''}
          <div>
            ${sel.asci?badge("ASCI COMPLAINT","#ff1744"):''}
            ${badge("Quadrant "+sel.quad,sel.quad==="IV"?"#ff1744":"#ffd740")}
            ${badge(sel.category,"#9e7ab5")}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;flex-shrink:0">
          ${[["ATE",sel.score.ate,"#00e5ff"],["NTI",sel.score.nti,sel.color],["UTI",sel.score.uti,sel.color],["AID",sel.score.aid,"#ff6d00"]].map(([l,v,co])=>`
          <div style="background:#0a0008;border-radius:6px;padding:7px 10px;text-align:center;border:1px solid ${co}30">
            <div class="mono" style="font-size:9px;color:#9e7ab5;margin-bottom:2px">${l}</div>
            <div class="syne" style="font-size:16px;font-weight:800;color:${co}">${v}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="grid2" style="margin-bottom:12px">
        <div style="padding:13px;background:#0a0008;border-radius:8px;border-left:2px solid #00e5ff">
          <div class="mono" style="font-size:9px;color:#00e5ff;letter-spacing:.12em;margin-bottom:7px">WHAT THE AD COMMUNICATES</div>
          <div style="font-size:12px;color:#f3e8ff;line-height:1.7">${sel.claim}</div>
        </div>
        <div style="padding:13px;background:#0a0008;border-radius:8px;border-left:2px solid ${sel.color}">
          <div class="mono" style="font-size:9px;color:${sel.color};letter-spacing:.12em;margin-bottom:7px">WHAT THE RECORDS SHOW</div>
          <div style="font-size:12px;color:#f3e8ff;line-height:1.7">${sel.reality}</div>
        </div>
      </div>
      ${infoBox("#ff1744","DOCUMENTED HARM",sel.harmful)}
      ${infoBox("#e040fb","IMPACT ON CHILDREN",sel.kidImpact)}
      <div style="padding:13px;background:${sel.color}10;border-radius:8px;border:1px solid ${sel.color}30;margin-bottom:8px">
        <div class="mono" style="font-size:9px;color:${sel.color};letter-spacing:.12em;margin-bottom:5px">THE MORAL</div>
        <div style="font-size:13px;color:#f3e8ff;font-style:italic;line-height:1.65">${sel.moral}</div>
      </div>
      <div class="mono" style="font-size:9px;color:#4a2860;margin-top:4px">Source: ${sel.source}</div>
    </div>
  </div>
</div>`;
}

function renderDataSources() {
  return `<div>
    <div class="mono" style="font-size:11px;color:#9e7ab5;margin-bottom:18px;line-height:1.9;max-width:700px">
      Every score this system produces comes from documented public records — regulatory rulings, laboratory findings, court judgments, and consumer reports. The system does not express opinions. It aggregates existing verdicts.
    </div>
    <div class="grid3">
      ${SOURCES.map(s=>`
      <div class="panel">
        <div style="font-size:28px;margin-bottom:10px">${s.icon}</div>
        <div class="syne" style="font-size:13px;font-weight:700;color:#f3e8ff;margin-bottom:2px">${s.name}</div>
        <div class="mono" style="font-size:9px;color:#9e7ab5;margin-bottom:12px">${s.full}</div>
        ${bar(s.reliability,s.reliability>=90?"#00e676":s.reliability>=70?"#ffd740":"#ff6d00","Reliability",s.reliability+"%")}
        <div style="font-size:12px;color:#9e7ab5;line-height:1.65;margin-bottom:10px">${s.what}</div>
        <div style="padding:9px;background:#0a0008;border-radius:6px;border-left:2px solid #00e5ff">
          <div class="mono" style="font-size:9px;color:#00e5ff;margin-bottom:3px;letter-spacing:.1em">HOW WE USE IT</div>
          <div style="font-size:11px;color:#f3e8ff;line-height:1.55">${s.use}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderForKids() {
  const qhtml = QUIZ.map((q,i)=>{
    const ans = state.quizAnswers[i];
    const isAnswered = ans !== undefined;
    return `<div class="quiz-q${isAnswered?(ans===q.correct?" correct":" wrong"):''}">
      <div class="mono" style="font-size:11px;color:#f3e8ff;margin-bottom:10px;line-height:1.65">Q${i+1}. ${q.q}</div>
      ${q.options.map((opt,j)=>`
        <button class="quiz-opt${isAnswered?(j===q.correct?" correct-opt":ans===j?" wrong-opt":""):''}"
          onclick="answerQuiz(${i},${j})" ${isAnswered?'disabled':''}>${opt}</button>
      `).join('')}
      ${isAnswered?`<div class="quiz-explain">${q.explain}</div>`:''}
    </div>`;
  }).join('');

  return `<div class="flex-col">
    <div class="panel" style="text-align:center;padding:28px;border-color:rgba(224,64,251,.3);box-shadow:0 0 30px rgba(224,64,251,.05)">
      <div style="font-size:40px;margin-bottom:12px">🧠</div>
      <div class="syne" style="font-size:18px;font-weight:800;color:#e040fb;margin-bottom:10px">Ads are designed to work on your brain before you start thinking.</div>
      <div style="font-size:13px;color:#9e7ab5;line-height:1.8;max-width:520px;margin:0 auto">That's not a conspiracy — it's how they're made. Knowing the tricks doesn't mean you're smarter than the ad. It means you get one extra second to decide. One second is actually a lot.</div>
    </div>

    <div class="grid3">
      ${CASES.slice(0,3).map(c=>`
      <div class="panel" style="border-color:${c.color}30;box-shadow:0 0 20px ${c.color}05">
        <div style="font-size:32px;margin-bottom:8px">${c.emoji}</div>
        <div class="mono" style="font-size:11px;font-weight:700;color:${c.color};margin-bottom:8px">${c.brand}</div>
        <div style="font-size:12px;color:#f3e8ff;line-height:1.65;margin-bottom:10px">${c.kidImpact}</div>
        <div style="padding:10px;background:${c.color}10;border-radius:7px;border:1px solid ${c.color}30;font-size:12px;color:#f3e8ff;font-style:italic;line-height:1.6">💡 ${c.moral}</div>
      </div>`).join('')}
    </div>

    <div class="panel" style="border-color:rgba(0,229,255,.2)">
      <div class="sec-label mono">THINK BEFORE YOU BELIEVE — QUIZ</div>
      ${qhtml}
    </div>

    <div class="panel">
      <div class="sec-label mono">BEFORE YOU BELIEVE ANY AD — FIVE CHECKS</div>
      ${[
        ["Is a celebrity in it?","They were paid to be there. The fee does not require them to use the product."],
        ["Does it make a health claim without numbers?","'Nutritious', 'immunity-boosting', 'nourishing' — these are words. Ask: how many grams? What percentage? Which study?"],
        ["Does it make you feel bad about yourself?","Any advertisement that begins from the premise that you are currently inadequate is selling you a problem that doesn't exist."],
        ["Does it create urgency?","'Only today', 'last chance', 'act now' — pause. If you still want it tomorrow, it was a real decision. If the panic was the only reason, that's what you were buying."],
        ["Does the product match the advertisement?","When you get it — compare. If it doesn't match, that information is useful. You are allowed to say so."],
      ].map(([title,desc],i)=>`
      <div style="display:flex;gap:14px;padding:11px 0;border-bottom:1px solid #2a0028">
        <div class="mono" style="font-size:18px;color:#ff2d78;flex-shrink:0;margin-top:2px">${i+1}</div>
        <div>
          <div class="mono" style="font-size:12px;color:#f3e8ff;margin-bottom:4px">${title}</div>
          <div style="font-size:12px;color:#9e7ab5;line-height:1.55">${desc}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── RENDER & EVENTS ───────────────────────────────────────────────────────────
function renderTab() {
  const content = document.getElementById('content');
  switch(state.tab) {
    case 0: content.innerHTML = renderChecker(); break;
    case 1: content.innerHTML = renderRealCases(); break;
    case 2: content.innerHTML = renderDataSources(); break;
    case 3: content.innerHTML = renderForKids(); break;
  }
}

function switchTab(i) {
  state.tab = i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderTab();
}
function loadSample(i) {
  const TEXTS=["Bournvita — Tayyari Jeet Ki! Made with vitamins and minerals, helps your child grow stronger and smarter. Champions drink Bournvita every day. Give your child the champion's edge!","Royal taste, elite lifestyle. Our cardamom blend — chosen by stars, enjoyed by those who know quality. When only the best will do. A statement, not just a product.","Mummy bhook lagi! Maggi — the great family nourisher. Ready in 2 minutes, packed with the nutrition your family needs. Iron, protein, and love in every bowl.","Unlock your true potential. Lighter, brighter skin in just 4 weeks — proven by dermatologists. Your success story starts with the right glow. Don't let anything hold you back.","Our dal makhani uses 150g black dal per serving, slow-cooked 8 hours. Contains 340 kcal, 12g protein. Sourced from Punjab farms. Spice level varies slightly by batch."];
  state.adText = TEXTS[i];
  state.scores = null; state.aiResult = null; state.error = null;
  renderTab();
}
function toggleKid() { state.kidMode=!state.kidMode; renderTab(); }
function toggleKey() { state.showKey=!state.showKey; renderTab(); }
function selectCase(i) { state.selectedCase=i; renderTab(); }
function answerQuiz(qi,oi) { state.quizAnswers={...state.quizAnswers,[qi]:oi}; renderTab(); }

// Init
renderTab();
</script>
</body>
</html>
